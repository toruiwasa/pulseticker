version: 2
updates:

  # ── npm / pnpm workspace ──────────────────────────────────────────────────
  # directory: "/" is the only valid option for a pnpm workspace. pnpm refuses
  # to run from subdirectories when pnpm-lock.yaml and pnpm-workspace.yaml
  # exist in a parent. Dependabot discovers workspace members via
  # pnpm-workspace.yaml and updates all of them from the root in one job.
  # .npmrc at the repo root pins registry=https://registry.npmjs.org/ to
  # prevent Dependabot from routing @scope/* packages through GitHub Packages.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      # Angular packages must move in lockstep — a version mismatch between
      # @angular/core and @angular/compiler-cli breaks the build.
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@angular-eslint/*"
          - "zone.js"

      # NestJS framework packages are equally version-coupled.
      nestjs:
        patterns:
          - "@nestjs/*"
          - "nestjs-*"

      # Remaining devDependencies not claimed by angular/nestjs above.
      # Covers: typescript, eslint, jest, ts-jest, vitest, prettier,
      # @types/*, nodemon, tsx, supertest, tsconfig-paths, globals, etc.
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "*"

      # All remaining production dependencies:
      # @supabase/supabase-js, socket.io, graphile-worker, zod, luxon,
      # jose, ws, rxjs, @taiga-ui/*, @maskito/*, @ng-web-apis/*,
      # lightweight-charts, reflect-metadata, class-transformer,
      # class-validator.
      production-deps:
        dependency-type: "production"
        patterns:
          - "*"

    ignore:
      # Angular 22 pins a hard peer range: typescript ">=6.0 <6.1"
      # (@angular/compiler-cli and @angular/build — same range on 22.0.3,
      # 22.0.5 and 22.0.6). A TypeScript major bump makes `ng build` refuse to
      # compile and the Vercel deploy fail; PR #46 bumped it to 7.0.2 and died.
      # Minor and patch TypeScript updates still flow.
      # Lift this once Angular widens the range — expected in Angular 23.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  # keepalive.yml currently has no `uses:` references, so no PRs open today.
  # Retained so future workflow additions (actions/checkout, etc.) are tracked
  # from day one.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
